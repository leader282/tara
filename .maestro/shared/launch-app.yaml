appId: com.leader282.tara
---
- stopApp
- clearState
- launchApp
- waitForAnimationToEnd:
    timeout: 10000
- extendedWaitUntil:
    visible: "DEVELOPMENT SERVERS|Welcome back|Runtime version: 1.0.0|This is the developer menu|Loading Tara..."
    timeout: 90000
- runFlow:
    when:
      visible: "DEVELOPMENT SERVERS"
    commands:
      - tapOn:
          point: "50%,28%"
      - waitForAnimationToEnd
# After connecting to the dev server the client re-downloads the full JS bundle
# (clearState wipes the cached bundle) and the app then runs its auth bootstrap.
# On a cold/long-running emulator this can take well over a minute, so wait for
# the developer menu or a real app screen to appear before trying to dismiss it.
- extendedWaitUntil:
    visible: "This is the developer menu|Runtime version: 1.0.0|Welcome back|Loading Tara...|Loading your profile...|Preparing your couple space...|Your private space"
    timeout: 150000
- runFlow:
    when:
      visible: "This is the developer menu"
    commands:
      - tapOn: "Continue"
      - waitForAnimationToEnd
- runFlow:
    when:
      visible: "Runtime version: 1.0.0"
    commands:
      - tapOn: "Close"
      - waitForAnimationToEnd
